<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Пассажирам.РФ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">Личный кабинет</a></li>
                    <li class="nav-item"><a class="nav-link" href="application.html">Подать заявку</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Выход</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Слайдер -->
        <div class="slider-container">
            <div class="slider-wrapper">
                <div class="slider-slides">
                    <div class="slider-slide">
                        <img src="img/slide1.jpg" alt="Автобус">
                        <div class="slider-text">Обучение вождению автобуса</div>
                    </div>
                    <div class="slider-slide">
                        <img src="img/slide2.jpg" alt="Электробус">
                        <div class="slider-text">Современные электробусы</div>
                    </div>
                    <div class="slider-slide">
                        <img src="img/slide3.jpg" alt="Трамвай">
                        <div class="slider-text">Классические трамваи</div>
                    </div>
                    <div class="slider-slide">
                        <img src="img/slide4.jpg" alt="Пассажиры">
                        <div class="slider-text">Безопасные пассажирские перевозки</div>
                    </div>
                </div>
            </div>
            <button class="slider-btn prev" aria-label="Предыдущий слайд">‹</button>
            <button class="slider-btn next" aria-label="Следующий слайд">›</button>
            <div class="slider-dots">
                <span class="slider-dot active"></span>
                <span class="slider-dot"></span>
                <span class="slider-dot"></span>
                <span class="slider-dot"></span>
            </div>
        </div>

        <h2>Личный кабинет</h2>
        <p class="lead">Здравствуйте, <strong id="userName"></strong>!</p>

        <div class="mt-4">
            <h3>Мои заявки</h3>
            <div id="applicationsList"></div>
        </div>

        <div class="mt-4">
            <button class="btn btn-success" id="feedbackBtn" disabled>Оставить отзыв</button>
            <small class="text-muted ms-2">(доступно для завершённых заявок без отзыва)</small>
            <div id="feedbackMessage" class="mt-2"></div>
        </div>
    </div>

    <!-- Модальное окно для отзыва -->
    <div class="modal fade" id="feedbackModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Оставить отзыв</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="feedbackAppSelect" class="form-label">Выберите заявку</label>
                        <select class="form-select" id="feedbackAppSelect"></select>
                    </div>
                    <div class="mb-3">
                        <label for="feedbackText" class="form-label">Текст отзыва</label>
                        <textarea class="form-control" id="feedbackText" rows="3" placeholder="Напишите ваш отзыв..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="saveFeedback">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script>
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });
    </script>
</body>
</html>
