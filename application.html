<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подача заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Пассажирам.РФ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Личный кабинет</a></li>
                    <li class="nav-item"><a class="nav-link active" href="application.html">Подать заявку</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutBtn">Выход</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card fade-in-up">
                    <div class="card-header">Оформление заявки на обучение</div>
                    <div class="card-body">
                        <form id="applicationForm">
                            <div class="mb-3">
                                <label for="transport" class="form-label">Вид транспорта</label>
                                <select class="form-select" id="transport" required>
                                    <option value="">Выберите вид транспорта</option>
                                    <option value="Автобус">Автобус</option>
                                    <option value="Электробус">Электробус</option>
                                    <option value="Трамвай">Трамвай</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="date" class="form-label">Дата начала обучения</label>
                                <input type="text" class="form-control" id="date" placeholder="ДД.ММ.ГГГГ (например, 01.01.2026)" required>
                                <small class="text-muted">Формат: ДД.ММ.ГГГГ</small>
                            </div>
                            <div class="mb-3">
                                <label for="payment" class="form-label">Способ оплаты</label>
                                <select class="form-select" id="payment" required>
                                    <option value="">Выберите способ оплаты</option>
                                    <option value="Предоплата по QR-коду">Предоплата по QR-коду</option>
                                    <option value="Оплата картой МИР">Оплата картой МИР</option>
                                    <option value="Постоплата в офисе">Постоплата в офисе</option>
                                </select>
                            </div>
                            <div id="applicationMessage"></div>
                            <button type="submit" class="btn btn-primary w-100">Отправить заявку</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script>
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });
    </script>
</body>
</html>
